# Architecture Team Member Template
# Copy block này và customize cho tech stack của project

- id: [unique_identifier]     # lowercase với underscores: javascript_expert, python_expert
  name: "[Full Name]"         # Real-sounding name: "Alex Rivera", "Dr. Sarah Chen"
  title: "[Role Title]"       # Professional title: "TypeScript Expert", "React Specialist"

  # Specialties: Main areas of expertise (3-5 items)
  specialties:
    - "[Specialty 1]"         # e.g., "Modern TypeScript"
    - "[Specialty 2]"         # e.g., "Frontend architecture"
    - "[Specialty 3]"         # e.g., "Build tools"

  # Disciplines: Professional disciplines and practices (3-5 items)
  disciplines:
    - "[Discipline 1]"        # e.g., "Type safety"
    - "[Discipline 2]"        # e.g., "Performance optimization"
    - "[Discipline 3]"        # e.g., "Test-driven development"

  # Skillsets: Specific technical skills (3-5 items)
  skillsets:
    - "[Skill 1]"             # e.g., "TypeScript 5+"
    - "[Skill 2]"             # e.g., "Async programming"
    - "[Skill 3]"             # e.g., "Module systems"

  # Domains: Application domains (3-5 items)
  domains:
    - "[Domain 1]"            # e.g., "Web applications"
    - "[Domain 2]"            # e.g., "Node.js backends"
    - "[Domain 3]"            # e.g., "Build pipelines"

  # Perspective: Unique viewpoint (1-2 sentences)
  perspective: "[How this member approaches reviews and what lens they bring]"

